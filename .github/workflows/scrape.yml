"""
Government Job Scraper — multi-source version
--------------------------------------------------
Covers ~20 major Indian government recruitment sources using a GENERIC
parser (looks for recruitment/vacancy keywords + PDF links, which almost
every govt career page uses), plus a slot for site-specific parsers where
the generic one isn't precise enough.

IMPORTANT HONESTY NOTE:
No scraper can reliably cover "all" government sites out of the box —
every site has different HTML, changes without notice, and some are
JS-rendered (need Playwright, not just requests+BeautifulSoup). This gives
you real, working coverage of the generic pattern across many sources, but
expect to:
  1. Run this, see which sources return 0 or garbage results
  2. Write a custom parse_<sitename>() function for those specific sites
  3. Register it in SOURCES below, replacing "parse_generic" for that entry

Run:
    pip install requests beautifulsoup4 python-dateutil
    python scraper.py
"""

import re
import json
import time
import sqlite3
import hashlib
from dataclasses import dataclass
from datetime import datetime
from typing import Optional

import requests
from bs4 import BeautifulSoup

USER_AGENT = "SarkariScanBot/0.2 (+https://example.com/bot-info)"
REQUEST_DELAY_SECONDS = 3       # be polite -- don't hammer govt servers
REQUEST_TIMEOUT = 20
DB_PATH = "jobs.db"

# Keywords used by the generic parser to decide "is this link actually a
# job notice" vs. random site navigation.
RELEVANT_KEYWORDS = [
    "recruitment", "vacancy", "vacancies", "notification", "advt",
    "advertisement", "apply online", "engagement", "posts", "bharti",
    "walk-in", "walk in",
]


# ---------------------------------------------------------------------------
# Data model
# ---------------------------------------------------------------------------

@dataclass
class JobPosting:
    source: str
    org: str
    post_title: str
    qualification: Optional[str]
    vacancies: Optional[int]
    last_date: Optional[str]
    apply_link: str
    notification_pdf: Optional[str]
    scraped_at: str
    raw_hash: str = ""

    def compute_hash(self):
        key = f"{self.source}|{self.post_title}"
        self.raw_hash = hashlib.sha256(key.encode("utf-8")).hexdigest()
        return self.raw_hash


# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------

def init_db(path=DB_PATH):
    conn = sqlite3.connect(path)
    conn.execute("""
        CREATE TABLE IF NOT EXISTS jobs (
            raw_hash TEXT PRIMARY KEY,
            source TEXT,
            org TEXT,
            post_title TEXT,
            qualification TEXT,
            vacancies INTEGER,
            last_date TEXT,
            apply_link TEXT,
            notification_pdf TEXT,
            scraped_at TEXT,
            first_seen TEXT,
            is_active INTEGER DEFAULT 1
        )
    """)
    conn.commit()
    return conn


def upsert_job(conn, job: JobPosting):
    job.compute_hash()
    existing = conn.execute(
        "SELECT raw_hash FROM jobs WHERE raw_hash = ?", (job.raw_hash,)
    ).fetchone()
    if existing:
        conn.execute(
            "UPDATE jobs SET scraped_at = ?, vacancies = ?, last_date = ? WHERE raw_hash = ?",
            (job.scraped_at, job.vacancies, job.last_date, job.raw_hash),
        )
    else:
        conn.execute(
            """INSERT INTO jobs
               (raw_hash, source, org, post_title, qualification, vacancies,
                last_date, apply_link, notification_pdf, scraped_at, first_seen, is_active)
               VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, 1)""",
            (job.raw_hash, job.source, job.org, job.post_title, job.qualification,
             job.vacancies, job.last_date, job.apply_link, job.notification_pdf,
             job.scraped_at, job.scraped_at),
        )
    conn.commit()


# ---------------------------------------------------------------------------
# Fetch helper
# ---------------------------------------------------------------------------

def fetch(url: str) -> Optional[str]:
    try:
        resp = requests.get(url, headers={"User-Agent": USER_AGENT}, timeout=REQUEST_TIMEOUT)
        resp.raise_for_status()
        return resp.text
    except requests.RequestException as e:
        print(f"[fetch error] {url}: {e}")
        return None


def extract_vacancy_count(text: str) -> Optional[int]:
    match = re.search(r"(\d[\d,]{2,})\s*(?:posts?|vacanc)", text, re.IGNORECASE)
    if match:
        return int(match.group(1).replace(",", ""))
    return None


def looks_relevant(text: str) -> bool:
    lowered = text.lower()
    return any(kw in lowered for kw in RELEVANT_KEYWORDS) or lowered.strip().endswith(".pdf")


# ---------------------------------------------------------------------------
# GENERIC PARSER — used for most sources below.
# Scans all links on the page, keeps ones that look like job notices
# (by keyword match or .pdf extension), and builds a basic listing.
# It deliberately does NOT try to extract last_date reliably at listing
# level — most sites only show that inside the individual PDF/notice page,
# which would need a second fetch per link (left as an extension point).
# ---------------------------------------------------------------------------

def parse_generic(html: str, base_url: str, org_name: str, source_key: str) -> list:
    soup = BeautifulSoup(html, "html.parser")
    results = []
    now = datetime.utcnow().isoformat()
    seen_titles = set()

    for link in soup.find_all("a", href=True):
        title = link.get_text(strip=True)
        href = link["href"]

        if not title or len(title) < 10:
            continue
        if not looks_relevant(title) and not looks_relevant(href):
            continue
        if title in seen_titles:
            continue
        seen_titles.add(title)

        if href.startswith("http"):
            full_url = href
        else:
            full_url = base_url.rstrip("/") + "/" + href.lstrip("/")

        is_pdf = href.lower().endswith(".pdf")

        results.append(JobPosting(
            source=source_key,
            org=org_name,
            post_title=title,
            qualification=None,
            vacancies=extract_vacancy_count(title),
            last_date=None,
            apply_link=base_url,
            notification_pdf=full_url if is_pdf else None,
            scraped_at=now,
        ))

    return results


# ---------------------------------------------------------------------------
# SITE-SPECIFIC PARSERS
# Add one of these per site once you've checked its real HTML and the
# generic parser isn't precise enough. This is a worked example for SSC;
# duplicate this pattern for other high-priority sources.
# ---------------------------------------------------------------------------

def parse_ssc(html: str, base_url: str, org_name: str, source_key: str) -> list:
    soup = BeautifulSoup(html, "html.parser")
    results = []
    now = datetime.utcnow().isoformat()

    for link in soup.select("a[href$='.pdf']"):
        title = link.get_text(strip=True)
        if not title or len(title) < 8:
            continue
        href = link.get("href")
        full_url = href if href.startswith("http") else base_url.rstrip("/") + "/" + href.lstrip("/")

        results.append(JobPosting(
            source=source_key,
            org=org_name,
            post_title=title,
            qualification=None,
            vacancies=extract_vacancy_count(title),
            last_date=None,
            apply_link=base_url,
            notification_pdf=full_url,
            scraped_at=now,
        ))

    return results


# ---------------------------------------------------------------------------
# SOURCE REGISTRY
# ~20 major Indian government recruitment sources. Every entry uses
# parse_generic by default. Swap in a custom parser (like parse_ssc above)
# for any source once you've verified its real HTML structure.
#
# NOTE: I have not verified these career-page URLs are still current or
# that every one of them allows scraping without JS rendering — some
# government sites (especially state PSCs) load their notice boards via
# JavaScript, which requests+BeautifulSoup can't see. Those will return
# 0 results here and need Playwright instead. Test each one and adjust.
# ---------------------------------------------------------------------------

SOURCES = [
    # -- Central government / exam bodies --
    {"key": "ssc",     "org": "Staff Selection Commission",              "url": "https://ssc.nic.in/",                       "parser": parse_ssc},
    {"key": "upsc",    "org": "Union Public Service Commission",          "url": "https://upsc.gov.in/",                      "parser": parse_generic},
    {"key": "ibps",    "org": "IBPS",                                    "url": "https://www.ibps.in/",                      "parser": parse_generic},
    {"key": "rrb",     "org": "Railway Recruitment Board",                "url": "https://www.rrbcdg.gov.in/",                "parser": parse_generic},
    {"key": "sbi",     "org": "State Bank of India — Careers",            "url": "https://sbi.co.in/web/careers",             "parser": parse_generic},
    {"key": "rbi",     "org": "Reserve Bank of India — Recruitment",      "url": "https://opportunities.rbi.org.in/",         "parser": parse_generic},
    {"key": "drdo",    "org": "DRDO",                                    "url": "https://www.drdo.gov.in/careers",           "parser": parse_generic},
    {"key": "isro",    "org": "ISRO Careers",                            "url": "https://www.isro.gov.in/Careers.html",      "parser": parse_generic},
    {"key": "nvs",     "org": "Navodaya Vidyalaya Samiti",                "url": "https://navodaya.gov.in/",                  "parser": parse_generic},
    {"key": "aiims",   "org": "AIIMS Delhi Recruitment",                  "url": "https://www.aiims.edu/en/recruitment.html", "parser": parse_generic},

    # -- Defence --
    {"key": "join_indian_army", "org": "Indian Army",                    "url": "https://joinindianarmy.nic.in/",            "parser": parse_generic},
    {"key": "indian_navy",      "org": "Indian Navy",                    "url": "https://www.joinindiannavy.gov.in/",        "parser": parse_generic},
    {"key": "indian_air_force", "org": "Indian Air Force",               "url": "https://afcat.cdac.in/",                    "parser": parse_generic},

    # -- State Public Service Commissions --
    {"key": "uppsc",  "org": "Uttar Pradesh PSC",                        "url": "https://uppsc.up.nic.in/",                  "parser": parse_generic},
    {"key": "upsssc", "org": "UP Subordinate Services Selection Comm.",  "url": "https://upsssc.gov.in/",                    "parser": parse_generic},
    {"key": "bpsc",   "org": "Bihar PSC",                                "url": "https://www.bpsc.bih.nic.in/",              "parser": parse_generic},
    {"key": "wbpsc",  "org": "West Bengal PSC",                          "url": "https://www.pscwbapplication.in/",          "parser": parse_generic},
    {"key": "mppsc",  "org": "Madhya Pradesh PSC",                       "url": "https://mppsc.mp.gov.in/",                  "parser": parse_generic},
    {"key": "rpsc",   "org": "Rajasthan PSC",                            "url": "https://rpsc.rajasthan.gov.in/",            "parser": parse_generic},
    {"key": "tnpsc",  "org": "Tamil Nadu PSC",                           "url": "https://www.tnpsc.gov.in/",                 "parser": parse_generic},
    {"key": "kpsc",   "org": "Karnataka PSC",                            "url": "https://kpsc.karnataka.gov.in/",            "parser": parse_generic},

    # -- State police --
    {"key": "wb_police", "org": "West Bengal Police Recruitment Board",   "url": "https://prbwb.gov.in/",                     "parser": parse_generic},
    {"key": "up_police",  "org": "UP Police Recruitment Board",           "url": "https://uppbpb.gov.in/",                    "parser": parse_generic},
]


# ---------------------------------------------------------------------------
# Runner
# ---------------------------------------------------------------------------

def run():
    conn = init_db()
    total_found = 0
    sources_with_zero = []

    for source in SOURCES:
        print(f"Scraping {source['key']} ({source['org']}) ...")
        html = fetch(source["url"])
        if not html:
            sources_with_zero.append(source["key"])
            continue

        jobs = source["parser"](html, source["url"], source["org"], source["key"])
        print(f"  found {len(jobs)} listings")
        if len(jobs) == 0:
            sources_with_zero.append(source["key"])

        for job in jobs:
            upsert_job(conn, job)
            total_found += 1

        time.sleep(REQUEST_DELAY_SECONDS)

    conn.close()
    print(f"\nDone. Processed {total_found} listings across {len(SOURCES)} source(s).")
    if sources_with_zero:
        print(f"\n⚠ These sources returned 0 results — likely JS-rendered pages "
              f"or changed HTML, worth checking manually: {', '.join(sources_with_zero)}")


def export_json(path="jobs_export.json"):
    conn = init_db()
    rows = conn.execute("SELECT * FROM jobs WHERE is_active = 1 ORDER BY scraped_at DESC").fetchall()
    cols = [d[0] for d in conn.execute("SELECT * FROM jobs LIMIT 0").description]
    data = [dict(zip(cols, row)) for row in rows]
    with open(path, "w") as f:
        json.dump(data, f, indent=2)
    conn.close()
    print(f"Exported {len(data)} jobs to {path}")


if __name__ == "__main__":
    run()
    export_json()
