name: Scrape jobs and refresh site data

on:
  schedule:
    # Runs every 4 hours. Adjust cadence as needed — govt sites don't
    # update fast enough to justify anything more frequent than hourly.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dateutil

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Copy fresh data into the frontend
        run: cp jobs_export.json frontend/jobs_export.json

      - name: Commit updated data (if changed)
        run: |
          git config user.name "job-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/jobs_export.json jobs.db
          git diff --cached --quiet || git commit -m "Auto-update job listings"
          git push
